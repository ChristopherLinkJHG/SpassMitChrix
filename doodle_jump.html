<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jump Space!</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;font-family:Arial,sans-serif;background:#0a1322;color:#fff;}
body{display:flex;justify-content:center;}
#stage{position:relative;width:480px;height:100vh;}
#hud{position:absolute;top:8px;left:8px;z-index:10;font-size:16px;}
#hud div{margin-bottom:4px;}
#motionBtn{position:absolute;top:8px;right:8px;z-index:10;padding:6px 10px;background:#444;color:#fff;border:none;border-radius:4px;cursor:pointer;}
#motionBtn:hover{background:#666;}
canvas{width:100%;height:100%;display:block;}
</style>
</head>
<body>
<div id="stage">
    <div id="hud">
        <div id="score">Score: 0</div>
        <div id="best">Best: 0</div>
        <div id="motionControls" style="margin-top:6px;font-size:13px;">
            <label style="display:inline-flex;align-items:center;gap:6px;">
                <input type="checkbox" id="invertMotion"> Invert
            </label>
            <button id="calibrateBtn" style="margin-left:8px;padding:4px 8px;font-size:12px;">Calibrate</button>
            <div id="diag" style="margin-top:6px;font-size:12px;opacity:0.9;line-height:1.2;"></div>
        </div>
    </div>
    <button id="motionBtn">Motion Off</button>
    <canvas id="gameCanvas"></canvas>
    <audio id="jumpSound" src="assets/jump.mp3"></audio> <!-- Add your sound file -->
    <audio id="gameOverSound" src="assets/game-over.mp3"></audio> <!-- Add your sound file -->
</div>
<script>
window.addEventListener('DOMContentLoaded', () => {
(()=> {
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function setSize(){
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    W = canvas.width;
    H = canvas.height;
}
let W=0,H=0;
setSize();
addEventListener('resize', setSize);

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
let best = +localStorage.doodleBest||0;
bestEl.textContent = 'Best: '+best;

const player = {
    x: W/2, y: H-100, w: 40, h: 40,
    vx: 0, vy: 0,
    gravity: 0.35,
    jumpVel: -14.0,
    moveSpeed: 0.5,
    maxHor: 6
};

let platforms = [];
let cameraY = 0;
let score = 0;
let running = true;
let accelX = 0;
let useMotion = false;
let lastGenY = 0;
let motionHandler = null;
let orientationHandler = null;
let screenAngle = 0; // current screen orientation angle (deg)
let invertMotion = false;
let zeroTilt = 0; // calibration offset (degrees)
let lastOrientationGamma = 0; // latest gamma reading for calibrate

function reset() {
    platforms = [];
    cameraY = 0;
    score = 0;
    player.x = W/2;
    player.y = H-120;
    player.vx = 0;
    player.vy = 0;
    lastGenY = 0;
    generateInitial();
    running = true;
}

function rand(min,max){return Math.random()*(max-min)+min;}

function chooseType(){
    const s = score;
    let types = ['normal'];
    if(s > 150) types.push('moving');
    if(s > 300) types.push('bounce');
    if(s > 500) types.push('disappear');
    const weights = { normal:1, moving:0.35, bounce:0.25, disappear:0.18 };
    let pool = [];
    types.forEach(t => {
        for(let i=0;i<weights[t]*10;i++) pool.push(t);
    });
    return pool[Math.floor(Math.random()*pool.length)];
}

function generatePlatform(y){
    const width = rand(70,130);
    const x = rand(0, W-width);
    const type = chooseType();
    let p = {x,y,width,height:16,type,used:false,vx:0,life:60};
    if(type==='moving'){
        p.vx = rand(-1.2,1.2);
    } else if(type==='bounce'){
        p.bounceBoost = -20;
    } else if(type==='disappear'){
        p.life = 40;
    }
    platforms.push(p);
}

function generateInitial(){
    for(let y = H; y > -4000; y -= 90){
        generatePlatform(y);
    }
    const spWidth = 160;
    platforms.push({
        x: player.x - spWidth/2,
        y: player.y + player.h + 8,
        width: spWidth,
        height: 22,
        type: 'start',
        used:false,vx:0,life:999
    });
    lastGenY = -4000;
}

function extendPlatforms(){
    while(lastGenY > cameraY - 6000){
        lastGenY -= 90;
        generatePlatform(lastGenY);
    }
    platforms = platforms.filter(p => (p.y - cameraY < H + 120) && (p.type!=='disappear' || !p.used || p.life>0));
}

function updatePlatforms(){
    for(const p of platforms){
        if(p.type==='moving'){
            p.x += p.vx;
            if(p.x < 0){ p.x = 0; p.vx *= -1; }
            if(p.x + p.width > W){ p.x = W - p.width; p.vx *= -1; }
        }
        if(p.type==='disappear' && p.used){
            p.life -= 1;
        }
    }
}

function updatePlayer(){
    player.vx += accelX * player.moveSpeed;
    if(keys.left) player.vx -= player.moveSpeed;
    if(keys.right) player.vx += player.moveSpeed;
    player.vx *= 0.92;
    player.vx = Math.max(Math.min(player.vx, player.maxHor), -player.maxHor);

    player.vy += player.gravity;
    player.x += player.vx;
    player.y += player.vy;

    if(player.x + player.w < 0) player.x = W;
    if(player.x > W) player.x = -player.w;

    if(player.vy > 0){
        for(const p of platforms){
            if(
                player.x + player.w > p.x &&
                player.x < p.x + p.width &&
                player.y + player.h > p.y &&
                player.y + player.h < p.y + p.height + player.vy + 4
            ){
                if(p.type==='bounce'){
                    player.vy = p.bounceBoost;
                } else {
                    player.vy = player.jumpVel;
                    document.getElementById('jumpSound').play(); // Play jump sound
                }
                if(p.type==='disappear'){
                    p.used = true;
                }
                score = Math.max(score, Math.floor(-(player.y - H + 120)/10));
                scoreEl.textContent = 'Score: '+score;
            }
        }
    }

    if(player.y < cameraY + H/2){
        cameraY = player.y - H/2;
    }

    if(player.y - cameraY > H + 150){
        running = false;
        document.getElementById('gameOverSound').play(); // Play game over sound
        if(score > best){ best = score; localStorage.doodleBest = best; }
        bestEl.textContent = 'Best: '+best;
    }
}

function drawStars() {
    ctx.fillStyle = 'white';
    for (let i = 0; i < 100; i++) {
        const x = Math.random() * W;
        const y = Math.random() * H;
        ctx.fillRect(x, y, 2, 2);
    }
}

function drawPlayer(){
    ctx.save();
    ctx.translate(player.x + player.w/2, player.y - cameraY + player.h/2);
    ctx.rotate(player.vx * 0.05);
    ctx.translate(-player.w/2, -player.h/2);
    ctx.fillStyle = '#ffe66d';
    roundRect(ctx,0,0,player.w,player.h,10);
    ctx.fillStyle='#333';
    ctx.fillRect(8,12,8,8);
    ctx.fillRect(player.w-16,12,8,8);
    ctx.fillStyle='#ff5d5d';
    ctx.fillRect(player.w/2-10, player.h-16,20,10);
    ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
    ctx.fill();
}

function drawPlatforms(){
    for(const p of platforms){
        const py = p.y - cameraY;
        if(py > -50 && py < H+50){
            ctx.save();
            let baseColor = '#4ad66d';
            let topColor = '#2d8740';
            if(p.type==='start'){ baseColor='#ffd54a'; topColor='#c49000'; }
            else if(p.type==='moving'){ baseColor='#4aa9d6'; topColor='#2c6e88'; }
            else if(p.type==='bounce'){ baseColor='#d64ae0'; topColor='#7d2d88'; }
            else if(p.type==='disappear'){
                const alpha = p.used ? Math.max(p.life/40,0) : 1;
                baseColor = `rgba(255,120,80,${alpha})`;
                topColor = `rgba(180,60,40,${alpha})`;
            }
            ctx.beginPath();
            ctx.roundRect(p.x, py, p.width, p.height, 6);
            ctx.fillStyle = baseColor;
            ctx.fill();
            ctx.fillStyle = topColor;
            ctx.fillRect(p.x+4, py+4, p.width-8, p.height-8);
            if(p.type==='moving'){
                ctx.fillStyle='rgba(255,255,255,0.35)';
                ctx.fillRect(p.x+6, py+6, p.width-12, p.height-12);
            }
            if(p.type==='bounce'){
                ctx.fillStyle='rgba(255,255,255,0.15)';
                for(let i=0;i<p.width;i+=10){
                    ctx.fillRect(p.x+i, py+2,6,p.height-4);
                }
            }
            ctx.restore();
        }
    }
}

function drawBackground(){
    ctx.fillStyle='#0a1322';
    ctx.fillRect(0,0,W,H);
    drawStars(); // Draw stars in the background
    ctx.fillStyle='rgba(255,255,255,0.15)';
    for(let i=0;i<40;i++){
        const sy = (cameraY*0.1 + i*200)%H;
        ctx.fillRect((i*97)%W, H - sy, 2,2);
    }
    drawBorders();
}

function drawBorders(){
    const stripeW = 12;
    const gradLeft = ctx.createLinearGradient(0,0,stripeW,0);
    gradLeft.addColorStop(0,'rgba(255,255,255,0.25)');
    gradLeft.addColorStop(1,'rgba(255,255,255,0)');
    const gradRight = ctx.createLinearGradient(W-stripeW,0,W,0);
    gradRight.addColorStop(0,'rgba(255,255,255,0)');
    gradRight.addColorStop(1,'rgba(255,255,255,0.25)');
    ctx.fillStyle=gradLeft;
    ctx.fillRect(0,0,stripeW,H);
    ctx.fillStyle=gradRight;
    ctx.fillRect(W-stripeW,0,stripeW,H);
    const stripeH = 18;
    ctx.save();
    ctx.globalAlpha=0.30;
    for(let y=(cameraY%stripeH)-stripeH; y < cameraY+H; y+=stripeH){
        const screenY = y - cameraY;
        if(screenY>-stripeH && screenY<H){
            ctx.fillStyle = (Math.floor(y/stripeH)%2===0)?'#ffcc00':'#ff6600';
            ctx.fillRect(0,screenY,stripeW, stripeH);
            ctx.fillRect(W-stripeW,screenY,stripeW, stripeH);
        }
    }
    ctx.restore();
}

function drawGameOver(){
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';
    ctx.font='bold 42px Arial';
    ctx.textAlign='center';
    ctx.fillText('Game Over', W/2, H/2 - 40);
    ctx.font='22px Arial';
    ctx.fillText('Score: '+score+'   Best: '+best, W/2, H/2);
    ctx.font='16px Arial';
    ctx.fillText('Press Space / Click / Tap to Restart', W/2, H/2 + 40);
}

function loop(){
    ctx.clearRect(0,0,W,H);
    drawBackground();
    if(running){
        updatePlayer();
        extendPlatforms();
        updatePlatforms();
        drawPlatforms();
        drawPlayer();
    } else {
        updatePlatforms();
        drawPlatforms();
        drawPlayer();
        drawGameOver();
    }
    requestAnimationFrame(loop);
}

const keys = {left:false,right:false};
addEventListener('keydown', e=>{
    if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left = true;
    if(e.code==='ArrowRight'||e.code==='KeyD') keys.right = true;
    if(!running){ reset(); }
});

// Wire up invert toggle and calibrate button
const invertEl = document.getElementById('invertMotion');
if(invertEl){
    invertEl.addEventListener('change', ()=>{ invertMotion = !!invertEl.checked; });
}
const calibBtn = document.getElementById('calibrateBtn');
if(calibBtn){
    calibBtn.addEventListener('click', ()=>{
        // set current gamma as zero reference for orientation-based control
        zeroTilt = lastOrientationGamma || 0;
        // tiny feedback via diag
        const diagEl = document.getElementById('diag');
        if(diagEl) diagEl.textContent = 'Calibrated at γ=' + zeroTilt.toFixed(2) + '°';
        setTimeout(()=>{ if(diagEl) diagEl.textContent = ''; }, 1200);
    });
}
addEventListener('keyup', e=>{
    if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left = false;
    if(e.code==='ArrowRight'||e.code==='KeyD') keys.right = false;
});

// Start game on click / touch (pointer)
canvas.addEventListener('pointerdown', () => {
    if(!running) reset();
});

function enableMotion(){
    if(motionHandler || orientationHandler) return;

    // Determine screen orientation angle with sensible fallbacks
    function getScreenAngle(){
        const so = (screen && screen.orientation && typeof screen.orientation.angle === 'number') ? screen.orientation.angle : null;
        if(so !== null) return ((so % 360) + 360) % 360;
        if(typeof window.orientation === 'number') return ((window.orientation % 360) + 360) % 360;
        return 0;
    }

    // Update diagnostic HUD (if present)
    const diagEl = document.getElementById('diag');
    function updateDiag(raw){
        if(!diagEl) return;
        const lines = [];
        if(raw){
            if('gamma' in raw) lines.push('γ:'+raw.gamma.toFixed(2)+'°');
            if('beta' in raw) lines.push('β:'+raw.beta.toFixed(2)+'°');
            if('ax' in raw) lines.push('ax:'+raw.ax.toFixed(3)+' ay:'+raw.ay.toFixed(3));
            if('mapped' in raw) lines.push('mapped:'+raw.mapped.toFixed(3));
        }
        lines.push('angle:'+screenAngle+'°');
        lines.push('invert:'+ (invertMotion? 'yes':'no'));
        diagEl.textContent = lines.join('   |   ');
    }

    // DeviceOrientation (preferred): use gamma (left/right tilt)
    orientationHandler = function(ev){
        const gamma = (typeof ev.gamma === 'number') ? ev.gamma : 0;
        lastOrientationGamma = gamma;
        const adjusted = (gamma - zeroTilt) * (invertMotion ? -1 : 1);
        const mapped = Math.sin(adjusted * Math.PI/180);
        accelX = mapped * 0.08;
        updateDiag({gamma, beta: ev.beta || 0, ax:0, ay:0, mapped});
    };

    // DeviceMotion fallback: map accelerationIncludingGravity to screen X using rotation mapping
    function mapAccelToScreenX(ev){
        const g = ev.accelerationIncludingGravity || ev.acceleration || {x:0,y:0,z:0};
        const rawX = g.x || 0;
        const rawY = g.y || 0;
        const a = screenAngle;
        let mapped = 0;
        if(a === 0){ mapped = -rawX; }
        else if(a === 90){ mapped = rawY; }
        else if(a === 180){ mapped = rawX; }
        else if(a === 270){ mapped = -rawY; }
        else { const rad = a * Math.PI/180; mapped = rawX * Math.cos(rad) + rawY * Math.sin(rad); mapped = -mapped; }
        if(invertMotion) mapped = -mapped;
        return mapped;
    }

    // initialize angle and listen for changes
    screenAngle = getScreenAngle();
    window.addEventListener('orientationchange', ()=>{ screenAngle = getScreenAngle(); updateDiag(); });

    // devicemotion handler
    motionHandler = function(ev){
        const mapped = mapAccelToScreenX(ev);
        accelX = mapped * 0.08;
        updateDiag({ax: ev.accelerationIncludingGravity? ev.accelerationIncludingGravity.x||0:0, ay: ev.accelerationIncludingGravity? ev.accelerationIncludingGravity.y||0:0, mapped});
    };

    // Attach both handlers; orientation preferred by browsers that provide it
    window.addEventListener('deviceorientation', orientationHandler);
    window.addEventListener('devicemotion', motionHandler);
}

function disableMotion(){
    if(motionHandler){
        window.removeEventListener('devicemotion', motionHandler);
        motionHandler = null;
    }
    if(orientationHandler){
        window.removeEventListener('deviceorientation', orientationHandler);
        orientationHandler = null;
    }
    accelX = 0;
}

// Toggle motion on/off
const motionBtn = document.getElementById('motionBtn');
motionBtn.addEventListener('click', ()=>{
    if(!useMotion){
        // On iOS some browsers require permission for DeviceOrientation / DeviceMotion
        const needOrientPerm = (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function');
        const needMotionPerm = (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function');
        if(needOrientPerm || needMotionPerm){
            const promises = [];
            if(needOrientPerm) promises.push(DeviceOrientationEvent.requestPermission());
            if(needMotionPerm) promises.push(DeviceMotionEvent.requestPermission());
            Promise.all(promises).then(results => {
                // If at least one permission granted, enable motion handlers
                if(results.some(r=>r==='granted')){
                    useMotion = true;
                    enableMotion();
                    motionBtn.textContent='Motion On';
                }
            }).catch(()=>{});
        } else {
            useMotion = true;
            enableMotion();
            motionBtn.textContent='Motion On';
        }
    } else {
        disableMotion();
        useMotion = false;
        motionBtn.textContent='Motion Off';
    }
});

if(!CanvasRenderingContext2D.prototype.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
        if(r>w/2) r=w/2;
        if(r>h/2) r=h/2;
        this.beginPath();
        this.moveTo(x+r,y);
        this.lineTo(x+w-r,y);
        this.quadraticCurveTo(x+w,y,x+w,y+r);
        this.lineTo(x+w,y+h-r);
        this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
        this.lineTo(x+r,y+h);
        this.quadraticCurveTo(x,y+h,x,y+h-r);
        this.lineTo(x,y+r);
        this.quadraticCurveTo(x,y,x+r,y);
        this.closePath();
        return this;
    };
}

reset();
loop();
})();
});
</script>
</body>
</html>
