<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>P-Seminar Informatik 2025/26 - Christopher Link</title>
    <style>
        :root{
            --bg1:#b3e6ff; --bg2:#87ceeb;
            --card:#ffffff; --text:#0b1320;
            --accent:#2e8b57; --ring:#1e90ff;
            --shadow:0 10px 28px rgba(0,0,0,.14)
        }
        @media (prefers-color-scheme: dark){
            :root{
                --bg1:#151c27; --bg2:#0f1420;
                --card:#121821; --text:#f5f7fa;
                --shadow:0 14px 36px rgba(0,0,0,.55)
            }
        }
        *{box-sizing:border-box}
        html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
        body{
            display:grid;place-items:center;padding:32px;
            color:var(--text);
            background: radial-gradient(1200px 600px at 80% -10%, var(--bg1), transparent 70%),
                                    radial-gradient(900px 500px at -10% 110%, var(--bg1), transparent 60%),
                                    linear-gradient(160deg,var(--bg2),var(--bg1) 60%)
        }
        .container{width:min(1100px,100%)}
        .header{text-align:center;margin-bottom:26px}
        .title{margin:0 0 6px;font-size:clamp(28px,4vw,44px);letter-spacing:.3px}
        .subtitle{margin:0;opacity:.85;font-size:clamp(14px,2.2vw,18px)}
        .grid{
            display:grid;gap:16px;
            grid-template-columns:repeat(auto-fit,minmax(210px,1fr))
        }
        .card{
            display:flex;align-items:center;gap:12px;
            background:var(--card); color:inherit; text-decoration:none;
            border-radius:14px; padding:16px 18px;
            border:1px solid rgba(0,0,0,.06);
            box-shadow:var(--shadow);
            transform:translateY(0);
            transition:transform .18s ease, box-shadow .18s ease, outline-color .18s;
        }
        .card:hover{transform:translateY(-3px);box-shadow:0 18px 44px rgba(0,0,0,.18)}
        .card:focus{outline:3px solid var(--ring);outline-offset:2px}
        .icon{
            width:36px;height:36px;display:grid;place-items:center;
            font-size:26px;line-height:1;border-radius:10px;
            background:rgba(46,139,87,.12);color:var(--accent)
        }
        .label{font-weight:700;letter-spacing:.2px}
        .footer{margin-top:18px;text-align:center;opacity:.75;font-size:13px}
    </style>
</head>
<body>
    <main class="container">
        <header class="header">
            <h1 class="title">Spaß mit Chrix</h1>
            <p class="subtitle">Wähle ein Spiel und hab Spaß!</p>
        </header>

        <nav class="grid" aria-label="Spielauswahl">
            <a class="card" href="flappy.html">
                <span class="icon">🐦</span><span class="label">Flatter Vogel</span>
            </a>
            <a class="card" href="snake.html">
                <span class="icon">🐍</span><span class="label">Eat the Apple</span>
            </a>
            <a class="card" href="blackjack.html">
                <span class="icon">🃏</span><span class="label">Blackjack</span>
            </a>
            <a class="card" href="sudoku.html">
                <span class="icon">🔲</span><span class="label">Sudoku</span>
            </a>
            <a class="card" href="doodle_jump.html">
                <span class="icon">🪂</span><span class="label">Jump Space</span>
            </a>
            <!--    <a class="card" href="pacman.html">
                <span class="icon">🟡</span><span class="label">Pac‑Man</span>
            </a>
            <a class="card" href="counter.html">
                <span class="icon">🔢</span><span class="label">Counter</span>
            </a>
            <a class="card" href="pacman_motion.html">
                <span class="icon">🎮</span><span class="label">Pac‑Man Motion</span>
            </a>    -->
        </nav>

        <p class="footer">Tipp: Mit Tab navigieren und mit Enter starten.</p>
    </main>
</body>
</html>
