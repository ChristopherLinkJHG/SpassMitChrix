<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
        }
        .sudoku-board {
            display: inline-grid;
            grid-template-columns: repeat(9, 50px);
            grid-template-rows: repeat(9, 50px);
            gap: 0;
            border: 3px solid #000;
            background-color: #fff;
            margin: 20px 0;
        }
        .cell {
            width: 50px;
            height: 50px;
            border: 1px solid #ccc;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .cell:nth-child(3n):not(:nth-child(9n)) {
            border-right: 2px solid #000;
        }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid #000;
        }
        .cell.fixed {
            background-color: #e0e0e0;
            cursor: not-allowed;
        }
        .cell.error {
            background-color: #ffcccc;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sudoku</h1>
        <div class="sudoku-board" id="board"></div>
        <div>
            <button onclick="checkSolution()">Check Solution</button>
            <button onclick="newGame()">New Game</button>
        </div>
        <p id="message"></p>
    </div>

    <script>
        let solution = [];
        let puzzle = [];

        function generateSudoku() {
            // Simple puzzle for demonstration
            solution = [
                [5,3,4,6,7,8,9,1,2],
                [6,7,2,1,9,5,3,4,8],
                [1,9,8,3,4,2,5,6,7],
                [8,5,9,7,6,1,4,2,3],
                [4,2,6,8,5,3,7,9,1],
                [7,1,3,9,2,4,8,5,6],
                [9,6,1,5,3,7,2,8,4],
                [2,8,7,4,1,9,6,3,5],
                [3,4,5,2,8,6,1,7,9]
            ];
            
            puzzle = solution.map(row => [...row]);
            // Remove some numbers to create puzzle
            for(let i = 0; i < 40; i++) {
                let row = Math.floor(Math.random() * 9);
                let col = Math.floor(Math.random() * 9);
                puzzle[row][col] = 0;
            }
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            for(let i = 0; i < 9; i++) {
                for(let j = 0; j < 9; j++) {
                    const cell = document.createElement('input');
                    cell.className = 'cell';
                    cell.type = 'text';
                    cell.maxLength = 1;
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    
                    if(puzzle[i][j] !== 0) {
                        cell.value = puzzle[i][j];
                        cell.classList.add('fixed');
                        cell.readOnly = true;
                    }
                    
                    cell.addEventListener('input', function(e) {
                        if(!/^[1-9]$/.test(e.target.value)) {
                            e.target.value = '';
                        }
                    });
                    
                    board.appendChild(cell);
                }
            }
        }

        function checkSolution() {
            const cells = document.querySelectorAll('.cell');
            let correct = true;
            
            cells.forEach(cell => {
                cell.classList.remove('error');
                const row = parseInt(cell.dataset.row);
                const col = parseInt(cell.dataset.col);
                
                if(cell.value != solution[row][col]) {
                    if(cell.value !== '') {
                        cell.classList.add('error');
                    }
                    correct = false;
                }
            });
            
            const message = document.getElementById('message');
            if(correct) {
                message.textContent = '🎉 Congratulations! You solved it!';
                message.style.color = 'green';
            } else {
                message.textContent = 'Not quite right. Keep trying!';
                message.style.color = 'red';
            }
        }

        function newGame() {
            document.getElementById('message').textContent = '';
            generateSudoku();
            createBoard();
        }

        // Initialize game
        newGame();
    </script>
</body>
</html>
