<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Snake</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        :root{
            --size:20; /* pixel size of one grid cell */
            --cols:20;
            --rows:20;
        }
        html,body{height:100%;margin:0;font-family:sans-serif;background:#121214;color:#e6eef8;display:flex;align-items:center;justify-content:center}
        .wrap{display:flex;gap:20px;align-items:flex-start}
        canvas{background:#0b1220;border:6px solid #0f1724;image-rendering:pixelated}
        .hud{display:flex;flex-direction:column;gap:8px}
        .score{font-size:18px}
        button{padding:8px 12px;border-radius:6px;border:0;background:#1f6feb;color:white;cursor:pointer}
        .controls{display:flex;flex-direction:column;gap:8px;margin-top:6px}
        .dirpad{display:grid;grid-template-columns:repeat(3,48px);gap:6px;justify-items:center;align-items:center}
        .dirpad button{width:48px;height:48px;border-radius:6px}
        small{color:#9aa6bb}
    </style>
</head>
<body>
    <div class="wrap">
        <canvas id="c" width="400" height="400"></canvas>
        <div class="hud">
            <div class="score">Score: <span id="score">0</span></div>
            <div>Speed: <span id="speedLabel">8</span> FPS</div>
            <div style="display:flex;gap:8px">
                <button id="start">Start</button>
                <button id="pause">Pause</button>
                <button id="reset">Reset</button>
            </div>
            <div class="controls">
                <small>Use arrow keys / WASD</small>
                <div class="dirpad" aria-hidden="true">
                    <div></div><button data-dir="up">▲</button><div></div>
                    <button data-dir="left">◀</button><button data-dir="down">▼</button><button data-dir="right">▶</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const cell = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--size'));
        const cols = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cols'));
        const rows = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--rows'));
        const scoreEl = document.getElementById('score');
        const speedLabel = document.getElementById('speedLabel');
        const startBtn = document.getElementById('start');
        const pauseBtn = document.getElementById('pause');
        const resetBtn = document.getElementById('reset');

        canvas.width = cols * cell;
        canvas.height = rows * cell;

        let snake, dir, food, running, score, interval, fps=8;

        function resetGame(){
            snake = [{x: Math.floor(cols/2), y: Math.floor(rows/2)}];
            dir = {x:1,y:0};
            placeFood();
            score = 0;
            running = false;
            updateScore();
            speedLabel.textContent = fps;
            clearInterval(interval);
            draw();
        }

        function placeFood(){
            let ok=false;
            while(!ok){
                food = {x: Math.floor(Math.random()*cols), y: Math.floor(Math.random()*rows)};
                ok = !snake.some(s=>s.x===food.x && s.y===food.y);
            }
        }

        function updateScore(){ scoreEl.textContent = score; }

        function step(){
            const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
            // wall collision -> game over
            if(head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows){
                gameOver();
                return;
            }
            // self collision
            if(snake.some(s=>s.x===head.x && s.y===head.y)){ gameOver(); return; }
            snake.unshift(head);
            if(head.x===food.x && head.y===food.y){
                score++;
                placeFood();
                updateScore();
                // speed up a bit every 5 points
                if(score % 5 === 0){ fps = Math.min(20, fps + 1); restartInterval(); speedLabel.textContent = fps; }
            } else {
                snake.pop();
            }
            draw();
        }

        function draw(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // grid background
            ctx.fillStyle = '#071024';
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // draw food
            ctx.fillStyle = '#e53e3e';
            roundRect(ctx, food.x*cell+2, food.y*cell+2, cell-4, cell-4, 6);
            ctx.fill();

            // draw snake
            for(let i=0;i<snake.length;i++){
                const s = snake[i];
                if(i===0) ctx.fillStyle = '#9ae6b4';
                else ctx.fillStyle = '#2f855a';
                roundRect(ctx, s.x*cell+1, s.y*cell+1, cell-2, cell-2, 6);
                ctx.fill();
            }
        }

        function roundRect(ctx,x,y,w,h,r){
            ctx.beginPath();
            ctx.moveTo(x+r,y);
            ctx.arcTo(x+w,y,x+w,y+h,r);
            ctx.arcTo(x+w,y+h,x,y+h,r);
            ctx.arcTo(x,y+h,x,y,r);
            ctx.arcTo(x,y,x+w,y,r);
            ctx.closePath();
        }

        function gameOver(){
            running = false;
            clearInterval(interval);
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = '20px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Game Over - Score: '+score, canvas.width/2, canvas.height/2 - 10);
            ctx.font = '14px sans-serif';
            ctx.fillText('Press Start to play again', canvas.width/2, canvas.height/2 + 14);
        }

        function start(){
            if(running) return;
            running = true;
            restartInterval();
        }

        function restartInterval(){
            clearInterval(interval);
            interval = setInterval(step, 1000 / fps);
        }

        // input
        const opposites = {ArrowUp:'down',ArrowDown:'up',ArrowLeft:'right',ArrowRight:'left',
                                             w:'down',s:'up',a:'right',d:'left'};

        window.addEventListener('keydown', e=>{
            const key = e.key;
            let nx = dir.x, ny = dir.y;
            if(key === 'ArrowUp' || key === 'w'){ nx=0; ny=-1; }
            else if(key === 'ArrowDown' || key === 's'){ nx=0; ny=1; }
            else if(key === 'ArrowLeft' || key === 'a'){ nx=-1; ny=0; }
            else if(key === 'ArrowRight' || key === 'd'){ nx=1; ny=0; }
            else return;
            // prevent reverse
            if(snake.length>1 && nx === -dir.x && ny === -dir.y) return;
            dir = {x:nx,y:ny};
            e.preventDefault();
        });

        // on-screen buttons
        document.querySelectorAll('[data-dir]').forEach(btn=>{
            btn.addEventListener('click', ()=>{
                const d = btn.dataset.dir;
                let nx=0, ny=0;
                if(d==='up') ny=-1;
                if(d==='down') ny=1;
                if(d==='left') nx=-1;
                if(d==='right') nx=1;
                if(snake.length>1 && nx === -dir.x && ny === -dir.y) return;
                dir = {x:nx,y:ny};
                start();
            });
        });

        startBtn.addEventListener('click', ()=>start());
        pauseBtn.addEventListener('click', ()=>{
            running = false;
            clearInterval(interval);
        });
        resetBtn.addEventListener('click', ()=>{ fps=8; resetGame(); });

        // initial
        resetGame();
    </script>
</body>
</html></div>
